[build]
  base = "nextjs"
  command = "npm run build"
  # Relative to `base`. Cannot equal the base folder itself (plugin error).
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Required for Next.js App Router / SSR on Netlify (routing is not a static export).
[[plugins]]
  package = "@netlify/plugin-nextjs"
